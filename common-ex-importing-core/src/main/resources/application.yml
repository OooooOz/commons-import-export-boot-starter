spring:
  # 项目名称，默认情况下Nacos中配置需要和这个保持一致
  application:
    name: common-ex-importing

  # mysql 属性配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud?allowMultiQueries=true&characterEncoding=utf8&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true
    username: root
    password: 123456

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #开启sql日志

server:
  port: 8091

common:
  export:
    async:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 200
      page-size: 5000
      max-rows-per-sheet: 1000000
    storage:
      # local：开发联调写本地；aliyun：上传阿里云 OSS
      type: local
      object-prefix: exports
      local-root: ./data/export-files
      local-download-url: http://localhost:8091/api/export/task/local-file
      # type: aliyun 时配置以下参数，敏感信息建议放入环境变量或配置中心
      # endpoint: oss-cn-hangzhou.aliyuncs.com
      # bucket-name: your-bucket
      # access-key-id: ${OSS_ACCESS_KEY_ID}
      # access-key-secret: ${OSS_ACCESS_KEY_SECRET}
      # custom-domain: https://download.example.com
      # url-expire-seconds: 3600
    sample:
      enabled: true

